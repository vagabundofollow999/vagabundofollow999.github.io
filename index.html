<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Seguro</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial, sans-serif;
}

/* LOGIN CENTRADO */
#loginBox{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login{
  background:#111;
  padding:40px 30px;
  border-radius:14px;
  width:340px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,0,0.6);
}

.login h2{
  color:red;
  margin-bottom:25px;
  letter-spacing:1px;
}

.login input,
.login button{
  width:100%;
  height:45px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:15px;
  box-sizing:border-box;
}

.login input{
  padding:0 12px;
  background:#222;
  color:white;
  outline:none;
}

.login input:focus{
  box-shadow:0 0 8px red;
}

.login button{
  background:red;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.login button:hover{
  background:#cc0000;
  transform:scale(1.02);
}

#error{
  color:red;
  margin-top:10px;
  font-size:14px;
}

/* PLAYER */
#playerBox{
  display:none;
  position:relative;
  width:100vw;
  height:100vh;
  background:black;
}

video{
  width:100%;
  height:100%;
}

/* Watermark */
.watermark{
  position:fixed;
  top:15px;
  left:15px;
  width:80px;
  opacity:.35;
  z-index:9999;
}

/* Logout */
.logout{
  position:fixed;
  top:15px;
  right:15px;
  padding:8px 14px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  z-index:9999;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="loginBox">
  <div class="login">
    <h2>Acceso</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <div id="error"></div>
  </div>
</div>

<div id="playerBox">
  <button class="logout" onclick="logout()">Salir</button>
  <img src="https://raw.githubusercontent.com/vagabundofollow999/vagabundofollow999.github.io/main/file_0000000040f071f5b325452fcd1c1587.png" class="watermark">
  <video autoplay data-shaka-player id="video"></video>
</div>

<script>
const DB = "https://raw.githubusercontent.com/vagabundofollow999/vagabundofollow999.github.io/main/users.json";
const manifestUri = "https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd?dvr_window_length=30";

const deviceID = btoa(navigator.userAgent + screen.width + screen.height);

async function login(){
  const u = user.value.trim();
  const p = pass.value.trim();

  const res = await fetch(DB + "?t=" + Date.now());
  const users = await res.json();

  const acc = users.find(x =>
    x.user === u &&
    x.pass === p &&
    new Date(x.expire) >= new Date()
  );

  if(!acc) return error.innerText="Credenciales incorrectas o cuenta vencida";

  if(acc.device && acc.device !== deviceID){
    return error.innerText="Cuenta en uso en otro dispositivo";
  }

  localStorage.setItem("auth", JSON.stringify({u,p,deviceID}));
  startPlayer();
}

if(localStorage.getItem("auth")){
  startPlayer();
}

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

async function startPlayer(){
  loginBox.style.display="none";
  playerBox.style.display="block";

  const video = document.getElementById("video");

  const ui = video['ui'];
  const controls = ui.getControls();
  const player = controls.getPlayer();

  /* 🎨 Personalización UI */
  ui.configure({
    seekBarColors:{
      base:'rgba(255,255,255,.2)',
      buffered:'rgba(255,255,255,.4)',
      played:'rgb(255,0,0)'
    }
  });

  /* 🔐 DRM */
  player.configure({
    drm:{
      clearKeys:{
        "1c62a216a5fe423f959cb1ca02f62d83":"54f2fdc83c1da33cd9269bf21e08218c"
      }
    }
  });

  /* 🛑 Manejo de errores */
  player.addEventListener('error', e=>{
    console.error('Error Shaka:', e.detail);
  });

  try{
    await player.load(manifestUri);
  }catch(e){
    console.error('Error cargando manifest:', e);
  }
}
</script>

</body>
</html>
