<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="referrer" content="no-referrer"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

<style>
body {margin:0; background:#000; font-family:Arial; color:#fff;}

/* LOGIN */
#login-container {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background:#000; display:flex; justify-content:center; align-items:center; z-index:9999;
}
.login-box {
  background:#111; padding:35px; border-radius:10px; width:340px; max-width:90%; text-align:center; box-shadow:0 0 20px rgba(255,0,0,.4);
}
.login-box h2 { color:red; margin-bottom:20px; }
.login-box input, .login-box button { width:100%; padding:14px; margin-bottom:12px; border-radius:6px; box-sizing:border-box; font-size:16px; }
.login-box input { background:#222; border:none; color:#fff; }
.login-box button { background:red; border:none; color:#fff; font-weight:bold; cursor:pointer; }

/* EVENTOS */
#event-selector {
  display:none; width:100vw; height:100vh; background:#000;
  justify-content:center; align-items:center; flex-direction:column; position:fixed; top:0; left:0;
}
.event-card {
  background:#111; padding:15px; margin:10px; border-radius:10px; cursor:pointer; text-align:center;
  width:260px; box-shadow:0 0 15px rgba(255,0,0,.4);
}
.event-card img {
  width:120px; height:auto; display:block; margin:0 auto 10px auto; border-radius:8px;
}

/* PLAYER */
#player-container {
  display:none; justify-content:center; align-items:center;
  background:#000; position:fixed; top:0; left:0; width:100vw; height:100vh;
}
#youtube-theme {
  width:100%;
  height:auto;           /* Auto altura para móviles */
  max-height:100vh;      /* Nunca excede la pantalla */
  object-fit:contain;    /* Contenido visible completo */
  display:block;
}

/* BOTONES */
#exit-player {
  position:absolute; top:20px; left:20px; background:red; border:none; color:#fff;
  padding:10px 16px; border-radius:6px; cursor:pointer; z-index:10000;
}
#logout-btn {
  position:absolute; top:20px; right:20px; background:#444; border:none; color:#fff;
  padding:10px 16px; border-radius:6px; cursor:pointer; z-index:10000;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-container">
  <div class="login-box">
    <h2>Acceso Privado</h2>
    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <input id="deviceId" placeholder="ID del dispositivo">
    <button onclick="login()">INGRESAR</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- EVENTOS -->
<div id="event-selector">
  <button id="logout-btn" onclick="logout()">Cerrar sesión</button>

  <div class="event-card" onclick="playEvent('1')">
    <img src="https://i.ibb.co/Cs77Ttc7/tig-rezise.png">
    <div>Tigo Sports 1</div>
  </div>

  <div class="event-card" onclick="playEvent('2')">
    <img src="https://i.ibb.co/Cs77Ttc7/tig-rezise.png">
    <div>Tigo Sports 2</div>
  </div>

  <div class="event-card" onclick="playEvent('3')">
    <img src="https://i.ibb.co/Cs77Ttc7/tig-rezise.png">
    <div>Tigo Sports 3</div>
  </div>
</div>

<!-- PLAYER -->
<div id="player-container">
  <button id="exit-player" onclick="exitPlayer()">← Cambiar evento</button>
  <video autoplay data-shaka-player id="youtube-theme"></video>
</div>

<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
<script src="app.js" defer></script>

</body>
</html>
