<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Deportivo - Acceso</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial,Helvetica,sans-serif;
}

/* LOGIN */
#loginBox{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.login{
  background:#0f0f0f;
  padding:30px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,0,.45);
}
.login h2{
  color:red;
  margin-bottom:15px;
  letter-spacing:1px;
}
.login input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:6px;
  border:none;
  outline:none;
  background:#1c1c1c;
  color:white;
}
.login button{
  width:100%;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.login button:hover{background:#c30000;}
#error{
  color:red;
  margin-top:10px;
}

/* PLAYER */
#playerBox{
  display:none;
}
.watermark{
  position:fixed;
  top:12px;
  left:12px;
  width:90px;
  opacity:0.35;
  z-index:9999;
  pointer-events:none;
}
video{
  width:100vw;
  height:100vh;
  background:black;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login">
    <h2>Acceso</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <div id="error"></div>
  </div>
</div>

<!-- PLAYER -->
<div id="playerBox">
  <img src="https://raw.githubusercontent.com/vagabundofollow999/vagabundofollow999.github.io/main/file_0000000040f071f5b325452fcd1c1587.png" class="watermark">
  <video autoplay controls data-shaka-player id="video"></video>
</div>

<script>
/* BASE DE USUARIOS EN TU GITHUB */
const DB = "https://raw.githubusercontent.com/vagabundofollow999/vagabundofollow999.github.io/main/users.json";

/* LOGIN */
async function login(){
  const u = user.value.trim();
  const p = pass.value.trim();

  const res = await fetch(DB + "?t=" + Date.now());
  const users = await res.json();

  const valid = users.find(x =>
    x.user === u &&
    x.pass === p &&
    new Date(x.expire) >= new Date()
  );

  if(valid){
    localStorage.setItem("auth", btoa(u+":"+p));
    startPlayer();
  } else {
    error.innerText = "Acceso denegado o cuenta expirada";
  }
}

/* AUTO LOGIN */
if(localStorage.getItem("auth")){
  startPlayer();
}

/* INICIAR PLAYER */
async function startPlayer(){
  loginBox.style.display="none";
  playerBox.style.display="block";

  const manifestUri =
  "https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd?dvr_window_length=30";

  const video = document.getElementById("video");
  const player = new shaka.Player(video);

  player.configure({
    drm: {
      clearKeys: {
        "1c62a216a5fe423f959cb1ca02f62d83":
        "54f2fdc83c1da33cd9269bf21e08218c"
      }
    }
  });

  try{
    await player.load(manifestUri);
  }catch(e){
    console.error("Error:", e);
  }
}
</script>

</body>
  </html>
