<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="referrer" content="no-referrer" />

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css" />
<link rel='stylesheet' type='text/css' href="https://fonts.googleapis.com/icon?family=Material+Icons" />

<style>
body {
    margin: 0;
    background-color: #000;
    font-family: Arial, sans-serif;
    color: #fff;
}

/* Reproductor centrado */
#wrap {
    display: none;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN fijo y centrado */
#login-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    background: #111;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    max-width: 90%;
    text-align: center;
    box-sizing: border-box;
}

.login-box h2 {
    color: red;
    margin-bottom: 20px;
}

/* Casillas y botón uniformes */
.login-box input,
.login-box button {
    width: 100%;
    max-width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

.login-box input {
    background: #222;
    border: none;
    color: #fff;
}

.login-box button {
    background: red;
    border: none;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
}

.login-box button:hover {
    background: #cc0000;
}

#login-error {
    color: #ff4d4d;
    margin-top: 10px;
}

/* Selector de eventos */
#event-selector {
    display: none;
    width: 100vw;
    height: 100vh;
    background-color: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.event-button {
    background: #111;
    color: #fff;
    border: none;
    padding: 15px 30px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    width: 200px;
    max-width: 90%;
}

.event-button:hover {
    background: #222;
}

/* Centrado del reproductor en fullscreen */
.youtube-theme {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#youtube-theme {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container">
  <div class="login-box">
    <h2>Acceso Privado</h2>
    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <input type="text" id="deviceId" placeholder="ID del dispositivo">
    <button onclick="login()">INGRESAR</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- Selector de eventos -->
<div id="event-selector">
    <button class="event-button" onclick="loadEvent('Tigo Sports1')">Tigo Sports1</button>
    <button class="event-button" onclick="loadEvent('Tigo Sports2')">Tigo Sports2</button>
</div>

<!-- PLAYER -->
<section id="wrap">
    <div class="youtube-theme">
        <video autoplay data-shaka-player id="youtube-theme"></video>
    </div>
</section>

<script>
let playerInitialized = false;

const usersJSONurl = "https://vagabundofollow999.github.io/users.json";
let users = [];

// Eventos disponibles con sus MPD y ClearKey
const events = {
    "Tigo Sports1": {
        mpd: "https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd?dvr_window_length=30",
        key: "1c62a216a5fe423f959cb1ca02f62d83",
        value: "54f2fdc83c1da33cd9269bf21e08218c"
    },
    "Tigo Sports2": {
        mpd: "https://d2jluxxgx550su.cloudfront.net/out/v1/62de20495af84f908fa8963f50c44d46/index.mpd?dvr_window_length=30",
        key: "49b2c0e7037042b2aff9f064e0bb3311",
        value: "83849e30adf85440550292693147fbf7"
    }
};

// Traer usuarios
async function loadUsers() {
    try {
        const response = await fetch(usersJSONurl + "?nocache=" + Date.now());
        if (!response.ok) throw new Error("No se pudo cargar users.json");
        users = await response.json();
    } catch (e) {
        console.error("Error cargando users.json:", e);
    }
}
loadUsers();

// Inicializa Shaka Player
async function initPlayer(mpd, clearKey) {
    if (!mpd || !clearKey) return;
    if (!playerInitialized) playerInitialized = true;

    const video = document.getElementById('youtube-theme');
    const ui = video['ui'];

    const config = {
        seekBarColors: {
            base: 'rgba(255,255,255,.2)',
            buffered: 'rgba(255,255,255,.4)',
            played: 'rgb(255,0,0)',
        }
    };
    ui.configure(config);

    const controls = ui.getControls();
    const player = controls.getPlayer();

    player.configure({
        drm: {
            clearKeys: {
                [clearKey.key]: clearKey.value
            }
        }
    });

    try {
        await player.load(mpd);
    } catch (error) {
        console.error("Error cargando stream:", error);
    }
}

// Login con ID
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const deviceId = document.getElementById("deviceId").value.trim();
    const error = document.getElementById("login-error");

    if (!username || !password || !deviceId) {
        error.textContent = "Complete todos los campos";
        return;
    }

    const foundUser = users.find(u =>
        u.user === username &&
        u.pass === password &&
        u.device === deviceId
    );

    if (!foundUser) {
        error.textContent = "Usuario, contraseña o ID incorrectos";
        return;
    }

    const today = new Date().toISOString().split("T")[0];
    if (today > foundUser.expire) {
        error.textContent = "Tu acceso ha vencido";
        return;
    }

    localStorage.setItem("loggedUser", username);
    localStorage.setItem("loggedDevice", deviceId);

    // Mostrar selector de eventos
    document.getElementById("login-container").style.display = "none";
    document.getElementById("event-selector").style.display = "flex";
}

// Cargar evento seleccionado
function loadEvent(eventName) {
    const event = events[eventName];
    if (!event) return;

    document.getElementById("event-selector").style.display = "none";
    document.getElementById("wrap").style.display = "flex";

    initPlayer(event.mpd, event);
}

// Auto login
window.onload = function() {
    const loggedUser = localStorage.getItem("loggedUser");
    const loggedDevice = localStorage.getItem("loggedDevice");

    if (loggedUser && loggedDevice) {
        const foundUser = users.find(u =>
            u.user === loggedUser &&
            u.device === loggedDevice
        );

        if (foundUser) {
            document.getElementById("login-container").style.display = "none";
            document.getElementById("event-selector").style.display = "flex";
        }
    }
};
</script>

</body>
</html>
