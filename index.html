<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Magia Existe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    width:100vw;
    height:100vh;
    background:
        radial-gradient(circle at center,#1a0000 0%,#050505 40%,#000 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Georgia,serif;
}

/* Fondo pulsante */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle,#ff000015 0%,transparent 70%);
    animation:pulse 6s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
        opacity:.3;
    }
    to{
        transform:scale(1.4);
        opacity:.9;
    }
}

/* Círculos mágicos */
.magic-circle{
    position:absolute;
    width:500px;
    height:500px;
    border:2px solid rgba(255,255,255,.12);
    border-radius:50%;
    animation:rotate 40s linear infinite;
    filter:drop-shadow(0 0 20px red);
}

.magic-circle::before{
    content:"✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧";
    position:absolute;
    width:100%;
    top:-12px;
    color:white;
    font-size:28px;
    text-align:center;
    letter-spacing:20px;
}

.magic-circle2{
    width:700px;
    height:700px;
    animation:rotateReverse 60s linear infinite;
    opacity:.3;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes rotateReverse{
    from{transform:rotate(360deg);}
    to{transform:rotate(0deg);}
}

/* Texto principal */
.title{
    position:relative;
    text-align:center;
    opacity:0;
    transform:scale(.5);
    animation:
        reveal 12s ease forwards,
        vanish 12s ease forwards 70s;
}

.title h1{
    font-size:5rem;
    color:white;
    letter-spacing:8px;
    line-height:1.4;

    text-shadow:
        0 0 10px #fff,
        0 0 30px #fff,
        0 0 60px red,
        0 0 100px red,
        0 0 180px #ff0000;

    animation:
        floating 8s ease-in-out infinite,
        glow 4s ease-in-out infinite alternate;
}

@keyframes reveal{
    0%{
        opacity:0;
        transform:scale(.2) translateY(100px);
        filter:blur(30px);
    }
    100%{
        opacity:1;
        transform:scale(1) translateY(0);
        filter:blur(0);
    }
}

@keyframes vanish{
    to{
        opacity:0;
        transform:scale(1.5);
        filter:blur(40px);
    }
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px white,
        0 0 30px red,
        0 0 60px red;
    }

    to{
        text-shadow:
        0 0 20px white,
        0 0 50px white,
        0 0 90px red,
        0 0 160px red;
    }
}

@keyframes floating{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-20px);
    }
}

/* Partículas mágicas */
.spark{
    position:absolute;
    border-radius:50%;
    animation:fly linear infinite;
}

@keyframes fly{
    from{
        transform:
            translateY(110vh)
            translateX(0px)
            scale(0);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    90%{
        opacity:1;
    }

    to{
        transform:
            translateY(-120vh)
            translateX(150px)
            scale(2);
        opacity:0;
    }
}

/* Destellos */
.flash{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 50px white;
    animation:blink 3s infinite;
}

@keyframes blink{
    0%,100%{
        opacity:0;
        transform:scale(.5);
    }
    50%{
        opacity:1;
        transform:scale(3);
    }
}

@media(max-width:768px){
    .title h1{
        font-size:2.3rem;
        padding:20px;
        letter-spacing:4px;
    }

    .magic-circle{
        width:300px;
        height:300px;
    }

    .magic-circle2{
        width:420px;
        height:420px;
    }
}
</style>
</head>
<body>

<div class="magic-circle"></div>
<div class="magic-circle magic-circle2"></div>

<div class="title">
    <h1>
        En un mundo<br>
        donde la magia<br>
        si existe!
    </h1>
</div>

<script>

// Partículas mágicas
for(let i=0;i<250;i++){

    const s=document.createElement("div");
    s.className="spark";

    const size=Math.random()*6+2;

    s.style.width=size+"px";
    s.style.height=size+"px";

    s.style.left=Math.random()*100+"vw";

    const colors=[
        "#ffffff",
        "#ff0000",
        "#ff6666",
        "#ffeaea"
    ];

    const color=colors[Math.floor(Math.random()*colors.length)];

    s.style.background=color;
    s.style.boxShadow=`0 0 20px ${color}`;

    s.style.animationDuration=
        (15+Math.random()*25)+"s";

    s.style.animationDelay=
        Math.random()*20+"s";

    document.body.appendChild(s);
}

// Destellos aleatorios
for(let i=0;i<40;i++){

    const f=document.createElement("div");
    f.className="flash";

    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(f);
}

</script>

</body>
</html>
