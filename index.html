<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
<meta name="referrer" content="no-referrer"/>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css"/>

<style>
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
}

/* LOGIN */
#login-container{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:35px 25px;
border-radius:12px;
width:320px;
max-width:90%;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

.login-box h2{
color:#ff0000;
margin-bottom:20px;
}

.login-box input,
.login-box button{
width:100%;
height:48px;
padding:0 12px;
margin-bottom:12px;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
}

.login-box input{
background:#222;
border:none;
color:#fff;
}

.login-box input::placeholder{
color:#aaa;
}

.login-box button{
background:#ff0000;
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#cc0000;
}

#login-error{
color:#ff4d4d;
font-size:14px;
}

/* EVENTOS */
#event-selector{
display:none;
width:100vw;
height:100vh;
background:#000;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.event-button{
background:#111;
color:#fff;
border:none;
padding:16px;
font-size:16px;
cursor:pointer;
border-radius:10px;
width:200px;
box-shadow:0 0 15px rgba(255,0,0,.4);
display:flex;
flex-direction:column;
align-items:center;
transition:0.3s;
}

.event-button img{
width:100px;
height:100px;
object-fit:contain;
margin-bottom:10px;
border-radius:8px;
}

.event-button:hover{
background:#1a1a1a;
}

.event-button:focus{
outline:none;
background:#ffffff;
color:#000;
transform:scale(1.05);
}

.event-button:focus img{
filter:brightness(0);
}

/* PLAYER */
#player-container{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
position:relative;
background:#000;
}

/* VIDEO */
.youtube-theme{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#youtube-theme{
width:100%;
height:100%;
object-fit:contain;
}

/* BOTON SALIR */
#exit-player{
position:absolute;
top:15px;
left:15px;
z-index:9999;
background:#ff0000;
border:none;
color:#fff;
padding:10px 14px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

#exit-player:hover{
background:#cc0000;
}

/* CALIDAD */
#quality-menu{
position:absolute;
bottom:20px;
right:20px;
z-index:9999;
}
#quality-menu button{
margin:3px;
padding:8px;
background:#222;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}
#quality-menu button:hover{
background:#ff0000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container">
<div class="login-box">
<h2>Acceso Privado</h2>
<input id="username" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">
<input id="deviceId" placeholder="ID del dispositivo">
<button onclick="login()">INGRESAR</button>
<p id="login-error"></p>
</div>
</div>

<!-- EVENTOS -->
<div id="event-selector"></div>

<!-- PLAYER -->
<div id="player-container">
<button id="exit-player" onclick="exitPlayer()">← Cambiar evento</button>

<div id="quality-menu">
<button onclick="setQuality(1080)">1080p</button>
<button onclick="setQuality(720)">720p</button>
<button onclick="setQuality(480)">480p</button>
<button onclick="enableAuto()">AUTO</button>
</div>

<div class="youtube-theme">
<video autoplay playsinline data-shaka-player id="youtube-theme"></video>
</div>
</div>

<script>
const usersJSONurl="https://vagabundofollow999.github.io/users.json";
const eventsURL="https://vagabundofollow999.github.io/events.json";

let users=[];
let events={};
let player;

// 🔐 CARGAR USUARIOS
async function loadUsers(){
try{
const resp=await fetch(usersJSONurl+"?v="+Date.now());
users=await resp.json();
loadStoredLogin();
}catch(e){
console.log("Error cargando usuarios",e);
}
}
loadUsers();

// 🔁 AUTO LOGIN
function loadStoredLogin(){
const data=localStorage.getItem("user");
if(data){
const u=JSON.parse(data);
document.getElementById("username").value=u.username;
document.getElementById("password").value=u.password;
document.getElementById("deviceId").value=u.deviceId;
login();
}
}

// 🔑 LOGIN
function login(){
const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value.trim();
const deviceId=document.getElementById("deviceId").value.trim();
const error=document.getElementById("login-error");

const found=users.find(u=>u.user===username && u.pass===password && u.device===deviceId);

if(!found){
error.textContent="Credenciales incorrectas";
return;
}

const today=new Date().toISOString().split("T")[0];

if(today>found.expire){
error.textContent="Acceso vencido";
return;
}

localStorage.setItem("user", JSON.stringify({username,password,deviceId}));

document.getElementById("login-container").style.display="none";
document.getElementById("event-selector").style.display="flex";

loadEvents();
}

// 🔐 CARGAR EVENTOS JSON
async function loadEvents(){
try{
const resp=await fetch(eventsURL+"?v="+Date.now());
const data=await resp.json();
events={};
data.forEach(ev=>events[ev.id]=ev);
renderEvents();
}catch(e){
console.log("Error eventos",e);
}
}

// 🎬 RENDER
function renderEvents(){
const container=document.getElementById("event-selector");
container.innerHTML="";
for(const id in events){
const ev=events[id];
const btn=document.createElement("button");
btn.className="event-button";
btn.setAttribute("tabindex","0");
btn.onclick=()=>playEvent(ev.id);
btn.innerHTML=`<img src="${ev.icon || ''}"><span>${ev.name}</span>`;
container.appendChild(btn);
}
}

// 🎥 INIT PLAYER
async function initPlayer(){
const video=document.getElementById("youtube-theme");
shaka.polyfill.installAll();
const ui=video["ui"];
const controls=ui.getControls();
player=controls.getPlayer();
player.configure({
streaming:{bufferingGoal:10,rebufferingGoal:5},
abr:{enabled:true,defaultBandwidthEstimate:6000000}
});
player.addEventListener("error",e=>console.log(e));
}

// ▶️ PLAY EVENTO
async function playEvent(id){
const ev=events[id];
const video=document.getElementById("youtube-theme");

if(!ev.url){
alert("Evento aún sin señal");
return;
}

document.getElementById("event-selector").style.display="none";
document.getElementById("player-container").style.display="flex";

if(ev.type==="mpd"){
if(!player) await initPlayer();
if(ev.key && ev.value){
player.configure({drm:{clearKeys:{[ev.key]:ev.value}}});
}
await player.load(ev.url);
}else{
if(player){await player.destroy(); player=null;}
video.src=ev.url;
video.play();
}

enterFullscreen(video);
}

// 🔳 FULLSCREEN
function enterFullscreen(video){
if(video.requestFullscreen) video.requestFullscreen();
else if(video.webkitEnterFullscreen) video.webkitEnterFullscreen();
}

// 🎛️ CALIDAD
function setQuality(height){
if(!player) return;
player.configure({abr:{enabled:false}});
const tracks=player.getVariantTracks();
tracks.forEach(track=>{
if(track.height===height) player.selectVariantTrack(track,true);
});
}
function enableAuto(){
if(player) player.configure({abr:{enabled:true}});
}

// 🔙 SALIR
function exitPlayer(){
if(player) player.unload();
const video=document.getElementById("youtube-theme");
video.removeAttribute("src");
document.getElementById("player-container").style.display="none";
document.getElementById("event-selector").style.display="flex";
}

// 🔐 NAVEGACIÓN TECLADO
document.addEventListener("keydown", function(e){
const focusable = Array.from(document.querySelectorAll(".event-button"));
const index = focusable.indexOf(document.activeElement);
if(index === -1) return;
let next;
switch(e.key){
case "ArrowRight": next=index+1; break;
case "ArrowLeft": next=index-1; break;
case "ArrowDown": next=index+2; break;
case "ArrowUp": next=index-2; break;
case "Enter": document.activeElement.click(); return;
}
if(focusable[next]) focusable[next].focus();
});

// PWA
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js').then(()=>console.log("PWA activa")).catch(e=>console.log(e));
}

// 🔐 PROTECCIÓN
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e=>{
if(e.key==="F12") e.preventDefault();
if(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) e.preventDefault();
if(e.ctrlKey && e.key==="u") e.preventDefault();
});
setInterval(function(){
if(window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>Acceso bloqueado</h1>";
}
},1000);

</script>

</body>
</html>
