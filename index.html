<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="referrer" content="no-referrer" />

<!-- Librerías necesarias -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css" />
<link rel='stylesheet' type='text/css' href="https://fonts.googleapis.com/icon?family=Material+Icons" />

<style>
@import "https://fonts.googleapis.com/css?family=Play:300,400,700";
@import "https://fonts.googleapis.com/css?family=Monda:300,400,700";
@import "https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700";

body {
    margin: 0;
    background-color: #000;
    font-family: monda, sans-serif, source sans pro, Helvetica, Arial, sans-serif !important;
    color: #fff;
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    left: 0;
}

.myDiv {
    background-color: transparent;
    height: 75px;
    width: 100%;
    opacity: 1;
    transition: 0.3s;
    top: 0;
    position: absolute;
}

.myDiv:hover {
    opacity: 0.3;
}

#player {
    width: 100vw;
    height: calc(100% - 100px);
    max-height: 100vh;
    max-width: 177.78vh;
    margin: auto;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: #000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container" style="
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="background:#111;padding:30px;border-radius:10px;width:300px;text-align:center;">
<h2 style="color:red;margin-bottom:20px;">Acceso Privado</h2>

<input type="text" id="username" placeholder="Usuario" style="width:100%;padding:10px;margin-bottom:10px;background:#222;border:none;color:#fff;"><br>

<input type="password" id="password" placeholder="Contraseña" style="width:100%;padding:10px;margin-bottom:15px;background:#222;border:none;color:#fff;"><br>

<button onclick="login()" style="width:100%;padding:10px;background:red;border:none;color:#fff;font-weight:bold;cursor:pointer;">
INGRESAR
</button>

<p id="login-error" style="color:#ff4d4d;margin-top:10px;"></p>
</div>
</div>

<section id="wrap">
    <div class="youtube-theme">
        <video autoplay data-shaka-player poster="/img/tv-static.gif" id="youtube-theme" style="width: 100vw; height: calc(var(--vh, 1vh) * 100);"></video>
    </div>
</section>

<script>
const youtube_theme_manifestUri = 'https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd?dvr_window_length=30';

async function init() {
    const video = document.getElementById('youtube-theme');
    const ui = video['ui'];
    
    const config = {
        seekBarColors: {
            base: 'rgba(255,255,255,.2)',
            buffered: 'rgba(255,255,255,.4)',
            played: 'rgb(255,0,0)',
        }
    };
    ui.configure(config);

    const controls = ui.getControls();
    const player = controls.getPlayer();

    player.configure({
        drm: {
            clearKeys: {
                "1c62a216a5fe423f959cb1ca02f62d83": "54f2fdc83c1da33cd9269bf21e08218c"
            }
        }
    });

    window.player = player;
    window.ui = ui;

    player.addEventListener('error', (e) => console.error('Player Error:', e.detail));
    controls.addEventListener('error', (e) => console.error('UI Error:', e.detail));

    try {
        await player.load(youtube_theme_manifestUri);
    } catch (error) {
        console.error('Error cargando el stream:', error);
    }

    $('.shaka-overflow-menu-button').html('settings');
    $('.shaka-back-to-overflow-button .material-icons-round').html('arrow_back_ios_new');
}

document.addEventListener('shaka-ui-loaded', init);
document.addEventListener('shaka-ui-load-failed', () => console.error('No se pudo cargar Shaka UI'));


// ====== SISTEMA DE USUARIOS ======
const users = [
  {
    "user": "demo",
    "pass": "123456",
    "expire": "2026-12-31",
    "device": ""
  },
  {
    "user": "cliente1",
    "pass": "abc123",
    "expire": "2026-04-01",
    "device": ""
  }
];

function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("login-error");

    const foundUser = users.find(u => u.user === username && u.pass === password);

    if (!foundUser) {
        error.textContent = "Usuario o contraseña incorrectos";
        return;
    }

    const today = new Date().toISOString().split("T")[0];

    if (today > foundUser.expire) {
        error.textContent = "Tu acceso ha vencido";
        return;
    }

    localStorage.setItem("loggedUser", username);
    document.getElementById("login-container").style.display = "none";
}

window.onload = function() {
    const loggedUser = localStorage.getItem("loggedUser");
    if (loggedUser) {
        document.getElementById("login-container").style.display = "none";
    }
}
</script>

</body>
</html>
