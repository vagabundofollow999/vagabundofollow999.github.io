<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Snake Mobile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow:hidden;
}

h1{
    color:#ff0000;
    margin:10px 0;
    text-shadow:0 0 15px #ff0000;
}

.score{
    font-size:20px;
    margin-bottom:10px;
}

canvas{
    background:#111;
    border:3px solid #ff0000;
    box-shadow:0 0 20px #ff0000;
    width:95vw;
    max-width:400px;
    aspect-ratio:1;
}

.controls{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.row{
    display:flex;
    gap:10px;
}

.btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:15px;
    background:#ff0000;
    color:white;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 0 10px #ff0000;
}

.btn:active{
    transform:scale(0.95);
}

.restart{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-weight:bold;
    font-size:16px;
}
</style>
</head>
<body>

<h1>🐍 Snake Mobile</h1>

<div class="score">
Puntuación: <span id="score">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">

<button class="btn" onclick="setDirection('UP')">▲</button>

<div class="row">
<button class="btn" onclick="setDirection('LEFT')">◀</button>
<button class="btn" onclick="setDirection('DOWN')">▼</button>
<button class="btn" onclick="setDirection('RIGHT')">▶</button>
</div>

<button class="restart" onclick="restartGame()">
Reiniciar
</button>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const totalBoxes = 20;

let snake;
let food;
let direction;
let score;
let gameLoop;

function randomFood(){
    return {
        x: Math.floor(Math.random()*totalBoxes)*box,
        y: Math.floor(Math.random()*totalBoxes)*box
    };
}

function initGame(){
    snake = [{
        x: 10*box,
        y: 10*box
    }];

    food = randomFood();
    direction = "RIGHT";
    score = 0;

    document.getElementById("score").textContent = score;
}

function setDirection(newDir){

    if(newDir==="LEFT" && direction!=="RIGHT")
        direction="LEFT";

    if(newDir==="RIGHT" && direction!=="LEFT")
        direction="RIGHT";

    if(newDir==="UP" && direction!=="DOWN")
        direction="UP";

    if(newDir==="DOWN" && direction!=="UP")
        direction="DOWN";
}

function collision(head, body){
    for(let part of body){
        if(head.x===part.x && head.y===part.y){
            return true;
        }
    }
    return false;
}

function draw(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#ff0000";
    ctx.shadowBlur=15;
    ctx.shadowColor="#ff0000";
    ctx.fillRect(food.x,food.y,box,box);

    ctx.shadowBlur=0;

    snake.forEach((segment,index)=>{

        ctx.fillStyle=index===0 ? "#ffffff" : "#ff0000";

        ctx.fillRect(
            segment.x,
            segment.y,
            box,
            box
        );

        ctx.strokeStyle="#000";
        ctx.strokeRect(
            segment.x,
            segment.y,
            box,
            box
        );
    });

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction==="LEFT") headX-=box;
    if(direction==="RIGHT") headX+=box;
    if(direction==="UP") headY-=box;
    if(direction==="DOWN") headY+=box;

    const newHead={
        x:headX,
        y:headY
    };

    if(
        headX<0 ||
        headY<0 ||
        headX>=400 ||
        headY>=400 ||
        collision(newHead,snake)
    ){
        clearInterval(gameLoop);

        setTimeout(()=>{
            alert("💀 Game Over\n\nPuntuación: "+score);
        },100);

        return;
    }

    if(headX===food.x && headY===food.y){

        score++;

        document.getElementById("score").textContent=score;

        food=randomFood();

    }else{
        snake.pop();
    }

    snake.unshift(newHead);
}

function restartGame(){

    clearInterval(gameLoop);

    initGame();

    gameLoop=setInterval(draw,200);
}

initGame();

gameLoop=setInterval(draw,200);
</script>

</body>
</html>
