<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servidor en Mantenimiento</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

body{
    background: radial-gradient(circle at center, #0a0a0a, #000);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    overflow:hidden;
}

.contenedor{
    text-align:center;
    padding:40px 25px;
    border:1px solid rgba(255,0,0,0.4);
    border-radius:14px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    box-shadow: 0 0 25px rgba(255,0,0,0.25);
    animation: aparecer 1s ease;
}

@keyframes aparecer{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

.titulo{
    font-size:28px;
    letter-spacing:3px;
    color:#ff0000;
    margin-bottom:12px;
    animation: parpadeo 1.6s infinite alternate;
}

@keyframes parpadeo{
    from{opacity:1;}
    to{opacity:0.4;}
}

.texto{
    font-size:18px;
    line-height:1.6;
    color:#ddd;
}

.estado{
    margin-top:18px;
    font-size:14px;
    color:#aaa;
    letter-spacing:2px;
}

.barra{
    margin:22px auto 0;
    width:100%;
    max-width:280px;
    height:4px;
    background:#222;
    border-radius:3px;
    overflow:hidden;
}

.barra span{
    display:block;
    width:40%;
    height:100%;
    background: linear-gradient(90deg, transparent, #ff0000, transparent);
    animation: cargar 1.6s linear infinite;
}

@keyframes cargar{
    from{transform:translateX(-100%);}
    to{transform:translateX(300%);}
}

.footer{
    margin-top:16px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<div class="contenedor">
    <div class="titulo">⚠ SERVIDOR EN MANTENIMIENTO ⚠</div>

    <div class="texto">
        El evento deportivo no se encuentra disponible en este momento.<br>
        Estamos trabajando para restablecer la transmisión lo antes posible.
        <br><br>
        <strong>Por favor, vuelva más tarde.</strong>
    </div>

    <div class="barra"><span></span></div>

    <div class="estado">ACTUALIZANDO SERVICIOS...</div>

    <div class="footer">Gracias por su paciencia</div>
</div>

</body>
</html>
