<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor DASH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Dash.js -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 8px;
            outline: none;
        }
    </style>
</head>

<body>

<video id="videoPlayer" controls autoplay></video>

<script>
    const mpdUrl = "https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd";
    const jsonUrl = "https://dl.dropboxusercontent.com/scl/fi/bify73qa6pam1h5op5mg4/tigo3.json?rlkey=r2r6qmvzobpn1tib3n068ap1z";

    const video = document.getElementById("videoPlayer");
    const player = dashjs.MediaPlayer().create();

    fetch(jsonUrl)
        .then(res => res.json())
        .then(data => {

            console.log("JSON cargado:", data);

            // Si el JSON trae DRM ClearKey
            if (data?.drm?.clearkey) {
                player.setProtectionData({
                    "org.w3.clearkey": {
                        "clearkeys": data.drm.clearkey
                    }
                });
            }

            player.initialize(video, mpdUrl, true);
        })
        .catch(err => {
            console.error("Error cargando JSON:", err);
            player.initialize(video, mpdUrl, true);
        });
</script>

</body>
</html>
