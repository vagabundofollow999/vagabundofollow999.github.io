<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
<meta name="referrer" content="no-referrer"/>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css"/>

<style>
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
}

/* LOGIN */
#login-container{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:35px 25px;
border-radius:12px;
width:320px;
max-width:90%;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

.login-box h2{color:#ff0000;margin-bottom:20px;}

.login-box input,
.login-box button{
width:100%;
height:48px;
padding:0 12px;
margin-bottom:12px;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
}

.login-box input{background:#222;border:none;color:#fff;}
.login-box input::placeholder{color:#aaa;}

.login-box button{
background:#ff0000;
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{background:#cc0000;}

#login-error{color:#ff4d4d;font-size:14px;}

/* EVENTOS */
#event-selector{
display:none;
width:100vw;
height:100vh;
background:#000;
overflow-y:auto;
padding:20px;
}

/* CATEGORÍAS */
.category-row{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:30px;
}

.category-title{
width:90%;
color:#ff0000;
margin-bottom:10px;
text-align:left;
}

.category-scroll{
display:flex;
gap:15px;
overflow-x:auto;
scroll-behavior:smooth;
width:90%;
padding-bottom:10px;
}

.category-scroll::-webkit-scrollbar{height:6px;}
.category-scroll::-webkit-scrollbar-thumb{
background:#ff0000;border-radius:10px;
}

/* EVENT BUTTON */
.event-button{
background:#111;
color:#fff;
border:none;
padding:16px;
font-size:16px;
cursor:pointer;
border-radius:10px;
width:200px;
flex:0 0 auto;
box-shadow:0 0 15px rgba(255,0,0,.4);
display:flex;
flex-direction:column;
align-items:center;
transition:.3s;
}

.event-button img{
width:100px;
height:100px;
object-fit:contain;
margin-bottom:10px;
border-radius:8px;
}

.event-button:focus{
outline:none;
background:#fff;
color:#000;
transform:scale(1.05);
}

/* PLAYER */
#player-container{
display:none;
width:100vw;
height:100vh;
position:relative;
background:#000;
}

.youtube-theme{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#youtube-theme{
width:100%;
height:100%;
object-fit:contain;
}

/* CONTROLES SUPERIORES */
#top-controls{
position:absolute;
top:15px;
left:15px;
z-index:9999;
display:flex;
gap:10px;
}

.control-btn{
background:#ff0000;
color:#fff;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* CALIDAD */
#quality-menu{
position:absolute;
top:60px;
left:15px;
z-index:9999;
display:none;
}

#quality-menu button{
margin:3px;
padding:8px;
background:#222;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container">
<div class="login-box">
<h2>Acceso Privado</h2>
<input id="username" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">
<input id="deviceId" placeholder="ID del dispositivo">
<button onclick="login()">INGRESAR</button>
<p id="login-error"></p>
</div>
</div>

<!-- EVENTOS -->
<div id="event-selector"></div>

<!-- PLAYER -->
<div id="player-container">

<div id="top-controls">
<button class="control-btn" onclick="exitPlayer()">← Salir</button>
<button class="control-btn" onclick="toggleQualityMenu()">⚙ Calidad</button>
</div>

<div id="quality-menu">
<button onclick="setQuality(1080)">1080p</button>
<button onclick="setQuality(720)">720p</button>
<button onclick="setQuality(480)">480p</button>
<button onclick="enableAuto()">AUTO</button>
</div>

<div class="youtube-theme">
<video autoplay playsinline data-shaka-player id="youtube-theme"></video>
</div>
</div>

<script>
const usersJSONurl="https://vagabundofollow999.github.io/users.json";
const eventsURL="https://vagabundofollow999.github.io/events.json";

let users=[],events={},player;

async function loadUsers(){
const r=await fetch(usersJSONurl+"?v="+Date.now());
users=await r.json();
loadStoredLogin();
}
loadUsers();

function login(){
const u=username.value.trim();
const p=password.value.trim();
const d=deviceId.value.trim();
const f=users.find(x=>x.user===u&&x.pass===p&&x.device===d);

if(!f){login-error.textContent="Credenciales incorrectas";return;}

if(new Date().toISOString().split("T")[0]>f.expire){
login-error.textContent="Acceso vencido";return;
}

localStorage.setItem("user",JSON.stringify({u,p,d}));

login-container.style.display="none";
event-selector.style.display="block";

loadEvents();
}

function loadStoredLogin(){
const d=localStorage.getItem("user");
if(d){
const u=JSON.parse(d);
username.value=u.u;
password.value=u.p;
deviceId.value=u.d;
login();
}
}

async function loadEvents(){
const r=await fetch(eventsURL+"?v="+Date.now());
const data=await r.json();
events={};
data.forEach(e=>events[e.id]=e);
renderEvents();
}

function renderEvents(){
const c=event-selector;
c.innerHTML="";

const g={};
Object.values(events).forEach(e=>{
const cat=e.category||"Eventos";
if(!g[cat]) g[cat]=[];
g[cat].push(e);
});

for(const cat in g){

const row=document.createElement("div");
row.className="category-row";

const title=document.createElement("h2");
title.className="category-title";
title.textContent=cat;

const scroll=document.createElement("div");
scroll.className="category-scroll";

g[cat].forEach(e=>{
const b=document.createElement("button");
b.className="event-button";
b.onclick=()=>playEvent(e.id);
b.innerHTML=`<img src="${e.icon||''}"><span>${e.name}</span>`;
scroll.appendChild(b);
});

row.appendChild(title);
row.appendChild(scroll);
c.appendChild(row);
}
}

async function initPlayer(){
const v=document.getElementById("youtube-theme");
shaka.polyfill.installAll();
player=new shaka.Player(v);
}

async function playEvent(id){
const e=events[id];
const v=document.getElementById("youtube-theme");

event-selector.style.display="none";
player-container.style.display="block";

if(e.type==="mpd"){
if(!player) await initPlayer();
if(e.key) player.configure({drm:{clearKeys:{[e.key]:e.value}}});
await player.load(e.url);
}else{
if(player){await player.destroy();player=null;}
v.src=e.url;
v.play();
}

enterFullscreen();
}

function enterFullscreen(){
const el=document.getElementById("player-container");
if(el.requestFullscreen) el.requestFullscreen();
}

function setQuality(h){
if(!player) return;
player.configure({abr:{enabled:false}});
player.getVariantTracks().forEach(t=>{
if(t.height===h) player.selectVariantTrack(t,true);
});
}

function enableAuto(){
if(player) player.configure({abr:{enabled:true}});
}

function toggleQualityMenu(){
quality-menu.style.display=quality-menu.style.display==="none"?"block":"none";
}

function exitPlayer(){
if(player) player.unload();
youtube-theme.removeAttribute("src");
player-container.style.display="none";
event-selector.style.display="block";
}

/* CONTROL TV */
document.addEventListener("keydown",e=>{
const items=[...document.querySelectorAll(".event-button")];
const i=items.indexOf(document.activeElement);
if(i<0) return;

let n=i;
if(e.key==="ArrowRight") n=i+1;
if(e.key==="ArrowLeft") n=i-1;
if(e.key==="ArrowDown") n=i+5;
if(e.key==="ArrowUp") n=i-5;

if(items[n]){
items[n].focus();
items[n].scrollIntoView({behavior:"smooth",inline:"center"});
}
if(e.key==="Enter") document.activeElement.click();
});

/* PROTECCIÓN */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
if(e.key==="F12") e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key)) e.preventDefault();
});

</script>

</body>
</html>
