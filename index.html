<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
<meta name="referrer" content="no-referrer"/>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Sharp" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css"/>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:#fff;
}

/* LOGIN */

#login-container{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:35px;
border-radius:10px;
width:340px;
max-width:90%;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

.login-box h2{
color:red;
margin-bottom:20px;
}

.login-box input,
.login-box button{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:6px;
box-sizing:border-box;
font-size:16px;
}

.login-box input{
background:#222;
border:none;
color:#fff;
}

.login-box button{
background:red;
border:none;
color:#fff;
font-weight:bold;
cursor:pointer;
}

#login-error{
color:#ff4d4d;
}

/* EVENTOS */

#event-selector{
display:none;
width:100vw;
height:100vh;
background:#000;
justify-content:center;
align-items:center;
flex-direction:column;
}

.event-button{
background:#111;
color:#fff;
border:none;
padding:18px 40px;
margin:10px;
font-size:20px;
cursor:pointer;
border-radius:10px;
width:250px;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

/* PLAYER */

#player-container{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
position:relative;
}

.youtube-theme{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#youtube-theme{
width:100%;
height:100%;
object-fit:contain;
}

/* BOTON SALIR */

#exit-player{
position:absolute;
top:20px;
left:20px;
z-index:9999;
background:red;
border:none;
color:#fff;
padding:10px 16px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
font-size:14px;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

#exit-player:hover{
background:#cc0000;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-container">
<div class="login-box">

<h2>Acceso Privado</h2>

<input id="username" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">
<input id="deviceId" placeholder="ID del dispositivo">

<button onclick="login()">INGRESAR</button>

<p id="login-error"></p>

</div>
</div>

<!-- EVENTOS -->

<div id="event-selector">

<button class="event-button" onclick="playEvent('1')">
Tigo Sports1
</button>

<button class="event-button" onclick="playEvent('2')">
Tigo Sports2
</button>

</div>

<!-- PLAYER -->

<div id="player-container">

<button id="exit-player" onclick="exitPlayer()">← Cambiar evento</button>

<div class="youtube-theme">

<video autoplay data-shaka-player id="youtube-theme"></video>

</div>

</div>

<script>

const usersJSONurl="https://vagabundofollow999.github.io/users.json";

let users=[];

async function loadUsers(){

const resp=await fetch(usersJSONurl+"?v="+Date.now());
users=await resp.json();

}

loadUsers();

/* EVENTOS */

const events={

"1":{
mpd:"https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd?dvr_window_length=30",
key:"1c62a216a5fe423f959cb1ca02f62d83",
value:"54f2fdc83c1da33cd9269bf21e08218c"
},

"2":{
mpd:"https://d2jluxxgx550su.cloudfront.net/out/v1/62de20495af84f908fa8963f50c44d46/index.mpd?dvr_window_length=30",
key:"49b2c0e7037042b2aff9f064e0bb3311",
value:"83849e30adf85440550292693147fbf7"
}

};

let player;

/* INIT PLAYER */

async function initPlayer(){

const video=document.getElementById("youtube-theme");
const ui=video["ui"];
const controls=ui.getControls();
player=controls.getPlayer();

player.addEventListener("error",e=>console.log(e));

}

/* PLAY EVENT */

async function playEvent(id){

const ev=events[id];

document.getElementById("event-selector").style.display="none";
document.getElementById("player-container").style.display="flex";

if(!player) await initPlayer();

player.configure({
drm:{
clearKeys:{
[ev.key]:ev.value
}
}
});

await player.load(ev.mpd);

}

/* SALIR DEL PLAYER */

function exitPlayer(){

if(player){
player.unload();
}

document.getElementById("player-container").style.display="none";
document.getElementById("event-selector").style.display="flex";

}

/* LOGIN */

function login(){

const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value.trim();
const deviceId=document.getElementById("deviceId").value.trim();
const error=document.getElementById("login-error");

const found=users.find(u=>u.user===username && u.pass===password && u.device===deviceId);

if(!found){
error.textContent="Credenciales incorrectas";
return;
}

const today=new Date().toISOString().split("T")[0];

if(today>found.expire){
error.textContent="Acceso vencido";
return;
}

document.getElementById("login-container").style.display="none";
document.getElementById("event-selector").style.display="flex";

}

</script>

</body>
</html>
