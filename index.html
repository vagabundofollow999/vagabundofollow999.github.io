<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ZheHacK/fypnews.id@main/css/youtube-theme.css"/>

<style>
body {margin:0; background:#000; color:#fff; font-family:Arial;}

/* LOGIN */
#login-container {
  position:fixed; inset:0; display:flex; justify-content:center; align-items:center;
  background:#000; z-index:9999;
}
.login-box {
  background:#111; padding:30px; border-radius:10px; width:320px;
}
.login-box input, .login-box button {
  width:100%; padding:12px; margin-bottom:10px; border:none;
}
.login-box button { background:red; color:#fff; }

/* EVENTOS */
#event-selector {
  display:none; position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.event-card {
  background:#111; margin:10px; padding:15px; border-radius:10px;
}
.event-card img {
  width:120px; display:block; margin:auto;
}

/* PLAYER RESPONSIVE */
#player-container {
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

#youtube-theme {
  width:100%;
  height:auto;
  max-height:100vh;
  object-fit:contain;
}

/* CONTROLES ESTILO */
.shaka-controls-container {
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}
.shaka-seek-bar-container {
  height:6px !important;
}

/* BOTONES */
#exit-player, #logout-btn {
  position:absolute;
  padding:10px;
  border:none;
  border-radius:6px;
  color:#fff;
}
#exit-player { top:20px; left:20px; background:red; }
#logout-btn { top:20px; right:20px; background:#444; }

</style>
</head>

<body>

<div id="login-container">
  <div class="login-box">
    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <input id="deviceId" placeholder="ID dispositivo">
    <button onclick="login()">Ingresar</button>
    <p id="login-error"></p>
  </div>
</div>

<div id="event-selector">
  <button id="logout-btn" onclick="logout()">Cerrar sesión</button>

  <div class="event-card" onclick="playEvent('1')">
    <img src="https://i.ibb.co/Cs77Ttc7/tig-rezise.png">
    <div>Tigo Sports 1</div>
  </div>
</div>

<div id="player-container">
  <button id="exit-player" onclick="exitPlayer()">← Volver</button>
  <video autoplay data-shaka-player id="youtube-theme"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
<script src="app.js"></script>

</body>
</html>
